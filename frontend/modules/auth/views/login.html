<div class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-tr from-[#f4f7f6] to-[#e9ecef] dark:from-slate-900 dark:to-slate-950 p-4">
    <div class="w-full max-w-[440px] px-6">
        
        <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center" ng-show="errorMessage">
            {{ errorMessage }}
        </div>

        <div class="bg-white dark:bg-slate-900 shadow-[0_10px_25px_rgba(0,0,0,0.05)] rounded-xl overflow-hidden border border-slate-200/50 dark:border-slate-800 w-full">
            
            <div class="p-8 pb-4 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 mb-6">
                    <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1">medical_services</span>
                </div>
                <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">Helixcare System</h1>
                <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Bem-vindo ao Helixcare. Por favor, identifique-se.</p>
            </div>
            
            <form class="p-8 pt-4 space-y-5" ng-submit="submitLogin()">
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
                        <input ng-model="credentials.email" class="w-full pl-10 pr-4 py-3.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all text-slate-900 dark:text-white placeholder:text-slate-400 text-sm" placeholder="nome@exemplo.com" required type="email"/>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Senha</label>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
                        <input ng-model="credentials.password" class="w-full pl-10 pr-4 py-3.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all text-slate-900 dark:text-white placeholder:text-slate-400 text-sm" placeholder="••••••••" required type="password"/>
                    </div>
                </div>
                
                <div class="pt-2">
                    <button type="submit" ng-disabled="isLoading" class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 px-4 rounded-lg flex items-center justify-center gap-2 transition-all shadow-md hover:shadow-lg active:scale-[0.99] disabled:opacity-70 disabled:cursor-not-allowed min-h-[56px]">
                        <span class="flex items-center gap-2" ng-hide="isLoading">
                            Entrar 
                            <span class="material-symbols-outlined text-xl">arrow_forward</span>
                        </span>
                        
                        <div class="flex items-center gap-2" ng-show="isLoading">
                            <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
                            </svg>
                            <span>Autenticando...</span>
                        </div>
                    </button>
                </div>
            </form>
            
            <div class="bg-slate-50/50 dark:bg-slate-800/30 p-6 text-center border-t border-slate-100 dark:border-slate-800">
                <p class="text-[10px] text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] font-bold">
                    Sistema de Gestão Médica Certificado
                </p>
            </div>
        </div>
        
        <div class="mt-8 text-center">
            <p class="text-xs text-slate-400 dark:text-slate-600 font-medium">
                © 2026 Helixcare System.<br/>
                v4.8.2-stable
            </p>
        </div>
    </div>
</div>
