<div class="animate-fade-in" ng-cloak>

    <div class="mb-8">
        <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Configurações</h1>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Gerencie seu perfil, segurança e preferências do sistema.</p>
    </div>

    <div class="flex flex-col md:flex-row gap-8">

        <div class="w-full md:w-64 shrink-0">
            <nav class="flex flex-col gap-1">
                <button ng-click="setTab('PROFILE')"
                    ng-class="activeTab === 'PROFILE' ? 'bg-primary/10 text-primary font-bold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 font-medium'"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-left">
                    <span class="material-symbols-outlined">person</span> Meu Perfil
                </button>
                <button ng-click="setTab('SECURITY')"
                    ng-class="activeTab === 'SECURITY' ? 'bg-primary/10 text-primary font-bold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 font-medium'"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-left">
                    <span class="material-symbols-outlined">security</span> Segurança
                </button>
                <button hc-has-role="['ADMIN']" ng-click="setTab('CLINIC')"
                    ng-class="activeTab === 'CLINIC' ? 'bg-primary/10 text-primary font-bold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 font-medium'"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-left">
                    <span class="material-symbols-outlined">business</span> Dados da Clínica
                </button>
            </nav>
        </div>

        <div class="flex-1">

            <div class="flex flex-col items-center justify-center py-20" ng-if="isLoading">
                <svg class="animate-spin h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                        fill="currentColor"></path>
                </svg>
            </div>

            <div ng-if="!isLoading && activeTab === 'PROFILE'"
                class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm overflow-hidden animate-fade-in">

                <div
                    class="p-6 md:p-8 border-b border-slate-100 dark:border-slate-800 flex flex-col md:flex-row items-center gap-6">
                    <label class="relative group cursor-pointer">
                        <div class="size-24 rounded-full bg-slate-100 dark:bg-slate-800 border-4 border-white dark:border-slate-900 shadow-md flex items-center justify-center text-3xl font-bold text-primary overflow-hidden transition-all"
                            ng-class="{'opacity-50 grayscale': isUploadingAvatar}">
                            <img ng-if="profileData.avatar_url" ng-src="{{profileData.avatar_url}}"
                                class="w-full h-full object-cover">
                            <span ng-if="!profileData.avatar_url">{{ profileData.name.charAt(0) | uppercase }}</span>
                        </div>

                        <div class="absolute inset-0 bg-black/50 rounded-full flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                            ng-if="!isUploadingAvatar">
                            <span class="material-symbols-outlined text-white">photo_camera</span>
                        </div>

                        <div class="absolute inset-0 flex items-center justify-center" ng-if="isUploadingAvatar">
                            <span class="material-symbols-outlined text-primary text-3xl animate-spin">autorenew</span>
                        </div>

                        <input type="file" class="hidden" accept="image/*"
                            onchange="angular.element(this).scope().uploadAvatar(this)" ng-disabled="isUploadingAvatar">
                    </label>
                    <div class="text-center md:text-left">
                        <h2 class="text-2xl font-bold text-slate-900 dark:text-white">{{ profileData.name }}</h2>
                        <p class="text-sm font-semibold text-primary uppercase tracking-wider mt-1">{{
                            getRoleName(profileData.role) }}</p>
                    </div>
                </div>

                <form ng-submit="saveProfile()" class="p-6 md:p-8 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col gap-1.5 md:col-span-2">
                            <label class="text-[11px] font-bold uppercase tracking-wider text-slate-500">Nome
                                Completo</label>
                            <input type="text" ng-model="profileData.name" required
                                class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary text-sm p-3 transition-all text-slate-900 dark:text-white">
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[11px] font-bold uppercase tracking-wider text-slate-500">E-mail
                                (Login)</label>
                            <input type="email" ng-model="profileData.email" disabled
                                class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800/50 text-slate-500 text-sm p-3 cursor-not-allowed">
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[11px] font-bold uppercase tracking-wider text-slate-500">Documento / CRM
                                / Coren</label>
                            <input type="text" ng-model="profileData.document"
                                class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary text-sm p-3 transition-all text-slate-900 dark:text-white">
                        </div>

                        <div class="flex flex-col gap-1.5">
                            <label class="text-[11px] font-bold uppercase tracking-wider text-slate-500">Telefone
                                Celular</label>
                            <input type="text" ng-model="profileData.phone" placeholder="(00) 00000-0000"
                                class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary text-sm p-3 transition-all text-slate-900 dark:text-white">
                        </div>
                        <div class="flex flex-col gap-1.5"
                            ng-if="profileData.role === 'DOCTOR' || profileData.role === 'NURSE'">
                            <label class="text-[11px] font-bold uppercase tracking-wider text-slate-500">Especialidade
                                Clínica</label>
                            <input type="text" ng-model="profileData.specialty" placeholder="Ex: Cardiologista"
                                class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary text-sm p-3 transition-all text-slate-900 dark:text-white">
                        </div>
                    </div>

                    <div class="flex justify-end pt-4 border-t border-slate-100 dark:border-slate-800">
                        <button type="submit" ng-disabled="isSaving"
                            class="bg-primary text-white font-bold py-2.5 px-6 rounded-lg hover:brightness-105 transition-all shadow-lg shadow-primary/20 flex items-center gap-2 disabled:opacity-50">
                            <span class="material-symbols-outlined text-sm" ng-hide="isSaving">save</span>
                            <span class="material-symbols-outlined text-sm animate-spin"
                                ng-show="isSaving">autorenew</span>
                            {{ isSaving ? 'Salvando...' : 'Salvar Alterações' }}
                        </button>
                    </div>
                </form>
            </div>

            <div ng-if="!isLoading && activeTab === 'SECURITY'"
                class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-12 text-center shadow-sm animate-fade-in">
                <span
                    class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-600 mb-4">lock_reset</span>
                <h3 class="text-lg font-bold text-slate-700 dark:text-slate-300">Alteração de Senha</h3>
                <p class="text-sm text-slate-500 mt-2">Módulo de segurança em desenvolvimento. Em breve você poderá
                    gerenciar sua senha, 2FA e logs de sessão aqui.</p>
            </div>

        </div>
    </div>
</div>
